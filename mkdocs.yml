site_name: REslava.Result
site_url: https://reslava.github.io/nuget-package-reslava-result/
site_description: Functional Error Handling & Zero‑Boilerplate APIs for .NET
site_author: Rafa Eslava
repo_url: https://github.com/reslava/nuget-package-reslava-result
repo_name: GitHub
docs_dir: mkdocs
use_directory_urls: true
theme:
  name: material
  features:
  - navigation.tabs
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
plugins:
- social:       
    debug: false
    debug_grid: true
    debug_grid_step: 64
    debug_color: black
    cards_layout_dir: layouts
    cards_layout: custom    
    cards_dir: assets/images/social   
- tags
- git-revision-date-localized:
    type: date
    timezone: Europe/London
    locale: en
    fallback_to_build_date: false
    enable_creation_date: true
    enable_git_follow: false
    exclude:
    - index.md
nav:
- Home: index.md
- Getting Started:
  - REslava.Result - Getting Started: getting-started/index.md
  - Choose Your Path: getting-started/choose-your-path.md
  - Installation: getting-started/installation.md
  - Quick Start Scenarios: getting-started/quick-start-scenarios.md
  - Quick Start: getting-started/quick-start.md
  - 'The Transformation: 70-90% Less Code': getting-started/the-transformation-70-90-less-code.md
- Core Concepts:
  - Overview: core-concepts/index.md
  - Advanced Patterns: core-concepts/advanced-patterns.md
  - Error Types: core-concepts/error-types.md
  - Maybe: core-concepts/maybe.md
  - OneOf Unions: core-concepts/oneof-unions.md
  - REslava.Result Core Library: core-concepts/reslava.result-core-library.md
  - Validation Attributes: core-concepts/validation-attributes.md
  - Validation Rules: core-concepts/validation-rules.md
- ASP.NET:
  - Overview: aspnet/index.md
  - ASP.NET Integration: aspnet/asp.net-integration.md
  - OneOf to IResult: aspnet/oneof-to-iresult.md
  - SmartEndpoints: aspnet/smartendpoints.md
- Safety Analyzers:
  - Overview: safety-analyzers/index.md
  - Safety Analyzers: safety-analyzers/safety-analyzers.md
- Architecture:
  - Overview: architecture/index.md
  - Solid:
    - SOLID Architecture - REslava.Result.SourceGenerators v1.9.4+: architecture/solid/solid-architecture.md
    - REslava.Result — Core Type Hierarchy (v1.12.1): architecture/solid/uml-v1.12.1-core.md
    - REslava.Result — Source Generator Pipeline (v1.12.1): architecture/solid/uml-v1.12.1-generators.md
    - REslava.Result — Core Type Hierarchy (v1.25.0): architecture/solid/uml-v1.25.0-core.md
    - REslava.Result — Source Generator Pipeline (v1.25.0): architecture/solid/uml-v1.25.0-generators.md
  - Complete Architecture: architecture/complete-architecture.md
  - How Generators Work: architecture/how-generators-work.md
  - Package Structure: architecture/package-structure.md
- Code Examples:
  - Overview: code-examples/index.md
  - Samples:
    - REslava.Result Samples: code-examples/samples/examples.md
  - Quick Examples: code-examples/quick-examples.md
