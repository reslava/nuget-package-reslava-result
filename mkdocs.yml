site_name: REslava.Result
site_url: https://reslava.github.io/nuget-package-reslava-result/          
repo_url: https://github.com/reslava/nuget-package-reslava-result          
repo_name: GitHub
site_description: Functional Error Handling & Zero‑Boilerplate APIs for .NET
docs_dir: mkdocs
use_directory_urls: true
theme:
  name: material
  features:
    - navigation.tabs
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
plugins:
- social:
    cards_layout_options:
      background_color: '#4051b5'
      color: '#FFFFFF'
    cards_dir: assets/images/social
- tags
- git-revision-date-localized:
    type: date
    timezone: Europe/London
    locale: en
    fallback_to_build_date: false
    enable_creation_date: true
    enable_git_follow: false
    exclude:
    - index.md
nav:
- Home: index.md
- Getting Started:
  - REslava.Result - Getting Started: getting-started/index.md
  - Choose Your Path: getting-started/choose-your-path.md
  - Quick Start Scenarios: getting-started/quick-start-scenarios.md
  - Quick Start: getting-started/quick-start.md
  - Ready to Transform Your Error Handling?: getting-started/ready-to-transform-your-error-handling.md
  - 'The Transformation: 70-90% Less Code': getting-started/the-transformation-70-90-less-code.md
- Core Concepts:
  - Overview: core-concepts/index.md
  - Advanced Patterns: core-concepts/advanced-patterns.md
  - REslava.Result Core Library: core-concepts/reslava.result-core-library.md
- ASP.NET:
  - Overview: aspnet/index.md
  - ASP.NET Integration: aspnet/asp.net-integration.md
- Architecture:
  - Overview: architecture/index.md
  - Solid:
    - SOLID Architecture - REslava.Result.SourceGenerators v1.9.4+: architecture/solid/solid-architecture.md
    - REslava.Result — Core Type Hierarchy (v1.12.1): architecture/solid/uml-v1.12.1-core.md
    - REslava.Result — Source Generator Pipeline (v1.12.1): architecture/solid/uml-v1.12.1-generators.md
  - Complete Architecture: architecture/complete-architecture.md
  - Package Structure: architecture/package-structure.md
- Code Examples:
  - Overview: code-examples/index.md
  - Samples:
    - REslava.Result Samples: code-examples/samples/examples.md
  - Quick Examples: code-examples/quick-examples.md
- Testing:
  - Overview: testing/index.md
  - Production Benefits: testing/production-benefits.md
  - � Real-World Impact: testing/real-world-impact.md
  - Testing & Quality Assurance: testing/testing--quality-assurance.md
  - �🏆 Why Choose REslava.Result?: testing/why-choose-reslava.result.md
- Reference:
  - Overview: reference/index.md
  - Api Doc:
    - Advanced Patterns:
      - Advanced Patterns - Complete Guide: reference/api-doc/advanced-patterns/advanced-patterns.md
      - Integration Extensions API Reference: reference/api-doc/advanced-patterns/integration-extensions.md
      - Maybe\<T> API Reference: reference/api-doc/advanced-patterns/maybe.md
      - OneOf\<T1, T2, T3> API Reference: reference/api-doc/advanced-patterns/oneof3.md
      - OneOf\<T1, T2> API Reference: reference/api-doc/advanced-patterns/oneof.md
    - REslava.Result API Overview: reference/api-doc/overview.md
    - Reasons API Reference: reference/api-doc/reasons.md
    - Result Extensions API Reference: reference/api-doc/result-extensions.md
    - Result Factories API Reference: reference/api-doc/result-factories.md
    - Result Methods API Reference: reference/api-doc/result-methods.md
    - Validation Rules API Reference: reference/api-doc/validation-rules.md
  - Deep Dive Documentation: reference/deep-dive-documentation.md
  - Roadmap: reference/roadmap.md
  - Version History: reference/version-history.md
- Community:
  - Overview: community/index.md
  - Acknowledgments: community/acknowledgments.md
  - Contributing: community/contributing.md
  - Contributors: community/contributors.md
  - License: community/license.md
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.tabbed
- attr_list
- md_in_html
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji ''
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ''
extra_css:
- stylesheets/extra.css
extra_javascript:
- javascripts/cards.js
